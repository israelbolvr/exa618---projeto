<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Classificação Brasileirão</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
        }

        table {
            margin: 20px auto;
            border-collapse: collapse;
            width: 80%;
            background: #1e293b;
        }

        th, td {
            padding: 10px;
            border: 1px solid #334155;
        }

        th {
            background: #334155;
        }

        tr:hover {
            background: #475569;
        }
    </style>
</head>
<body>

    <h1>📊 Classificação Brasileirão</h1>

    <table>
        <tr>
            <th>Pos</th>
            <th>Time</th>
            <th>Pts</th>
            <th>J</th>
            <th>V</th>
            <th>E</th>
            <th>D</th>
            <th>GP</th>
            <th>GC</th>
            <th>SG</th>
        </tr>

        {% for time in tabela %}
        <tr>
            <td>{{ time.posicao }}</td>
            <td>{{ time.equipe }}</td>
            <td>{{ time.pontos }}</td>
            <td>{{ time.jogos }}</td>
            <td>{{ time.vitorias }}</td>
            <td>{{ time.empates }}</td>
            <td>{{ time.derrotas }}</td>
            <td>{{ time.gols_pro }}</td>
            <td>{{ time.gols_contra }}</td>
            <td>{{ time.saldo }}</td>
        </tr>
        {% endfor %}
    </table>

</body>
</html>
